<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gallery" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a6f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#44a08d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd93d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3fa796;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg-gallery)"/>
  
  <!-- Header -->
  <text x="600" y="60" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">Template Gallery</text>
  <text x="600" y="95" font-family="Arial, sans-serif" font-size="18" fill="#ffd700" text-anchor="middle">Choose from 100+ pre-built AI workflows</text>
  
  <!-- Template Cards Row 1 -->
  <g>
    <!-- Card 1: Chatbot -->
    <rect x="80" y="140" width="320" height="280" fill="url(#card1)" rx="15" opacity="0.85"/>
    <circle cx="240" cy="220" r="40" fill="#ffffff" opacity="0.3"/>
    <text x="240" y="310" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Customer Support</text>
    <text x="240" y="340" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" opacity="0.9">AI Chatbot</text>
    <rect x="100" y="365" width="80" height="25" fill="#ffffff" rx="12" opacity="0.3"/>
    <text x="140" y="382" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">Chatbot</text>
    <text x="340" y="390" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="end"> 4.8</text>
    
    <!-- Card 2: Image Processing -->
    <rect x="440" y="140" width="320" height="280" fill="url(#card2)" rx="15" opacity="0.85"/>
    <circle cx="600" cy="220" r="40" fill="#ffffff" opacity="0.3"/>
    <rect x="580" y="200" width="40" height="40" fill="#ffffff" opacity="0.4" rx="5"/>
    <text x="600" y="310" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Image Analysis</text>
    <text x="600" y="340" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" opacity="0.9">Object Detection</text>
    <rect x="460" y="365" width="100" height="25" fill="#ffffff" rx="12" opacity="0.3"/>
    <text x="510" y="382" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">Image AI</text>
    <text x="700" y="390" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="end"> 4.9</text>
    
    <!-- Card 3: Text Analysis -->
    <rect x="800" y="140" width="320" height="280" fill="url(#card3)" rx="15" opacity="0.85"/>
    <circle cx="960" cy="220" r="40" fill="#ffffff" opacity="0.3"/>
    <text x="960" y="310" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Sentiment Analysis</text>
    <text x="960" y="340" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" opacity="0.9">Social Media Monitor</text>
    <rect x="820" y="365" width="90" height="25" fill="#ffffff" rx="12" opacity="0.3"/>
    <text x="865" y="382" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" text-anchor="middle" font-weight="bold">Text AI</text>
    <text x="1060" y="390" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="end"> 4.7</text>
  </g>
  
  <!-- Template Cards Row 2 -->
  <g>
    <!-- Card 4: Automation -->
    <rect x="80" y="460" width="320" height="280" fill="url(#card4)" rx="15" opacity="0.85"/>
    <circle cx="240" cy="540" r="40" fill="#ffffff" opacity="0.3"/>
    <text x="240" y="630" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Email Automation</text>
    <text x="240" y="660" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" opacity="0.9">Auto Responder</text>
    <rect x="100" y="685" width="100" height="25" fill="#ffffff" rx="12" opacity="0.3"/>
    <text x="150" y="702" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" text-anchor="middle" font-weight="bold">Automation</text>
    <text x="340" y="710" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="end"> 4.6</text>
    
    <!-- Card 5: Prediction -->
    <rect x="440" y="460" width="320" height="280" fill="url(#card5)" rx="15" opacity="0.85"/>
    <circle cx="600" cy="540" r="40" fill="#ffffff" opacity="0.3"/>
    <text x="600" y="630" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Lead Scoring</text>
    <text x="600" y="660" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" opacity="0.9">Sales Predictor</text>
    <rect x="460" y="685" width="95" height="25" fill="#ffffff" rx="12" opacity="0.3"/>
    <text x="507" y="702" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" text-anchor="middle" font-weight="bold">Prediction</text>
    <text x="700" y="710" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="end"> 4.9</text>
    
    <!-- Card 6: Data Processing -->
    <rect x="800" y="460" width="320" height="280" fill="url(#card6)" rx="15" opacity="0.85"/>
    <circle cx="960" cy="540" r="40" fill="#ffffff" opacity="0.3"/>
    <text x="960" y="630" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Document Parser</text>
    <text x="960" y="660" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" opacity="0.9">Invoice Extractor</text>
    <rect x="820" y="685" width="110" height="25" fill="#ffffff" rx="12" opacity="0.3"/>
    <text x="875" y="702" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" text-anchor="middle" font-weight="bold">Data Process</text>
    <text x="1060" y="710" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="end"> 4.8</text>
  </g>
</svg>
