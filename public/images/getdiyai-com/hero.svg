<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-getdiyai-hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f7931e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-yellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb300;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#grad-getdiyai-hero)"/>
  
  <!-- Decorative circuit pattern -->
  <g opacity="0.1" stroke="#ff6b35" stroke-width="2" fill="none">
    <circle cx="150" cy="150" r="40"/>
    <circle cx="874" cy="150" r="40"/>
    <circle cx="150" cy="874" r="40"/>
    <circle cx="874" cy="874" r="40"/>
    <line x1="150" y1="150" x2="874" y2="150"/>
    <line x1="874" y1="150" x2="874" y2="874"/>
    <line x1="874" y1="874" x2="150" y2="874"/>
    <line x1="150" y1="874" x2="150" y2="150"/>
  </g>
  
  <!-- Central gear/cog representing DIY -->
  <g transform="translate(512, 400)">
    <circle r="80" fill="url(#grad-orange)" opacity="0.8"/>
    <path d="M 0,-100 L 15,-85 L 15,-70 L 0,-70 L -15,-70 L -15,-85 Z" fill="url(#grad-yellow)" opacity="0.9"/>
    <path d="M 0,-100 L 15,-85 L 15,-70 L 0,-70 L -15,-70 L -15,-85 Z" fill="url(#grad-yellow)" opacity="0.9" transform="rotate(60)"/>
    <path d="M 0,-100 L 15,-85 L 15,-70 L 0,-70 L -15,-70 L -15,-85 Z" fill="url(#grad-yellow)" opacity="0.9" transform="rotate(120)"/>
    <path d="M 0,-100 L 15,-85 L 15,-70 L 0,-70 L -15,-70 L -15,-85 Z" fill="url(#grad-yellow)" opacity="0.9" transform="rotate(180)"/>
    <path d="M 0,-100 L 15,-85 L 15,-70 L 0,-70 L -15,-70 L -15,-85 Z" fill="url(#grad-yellow)" opacity="0.9" transform="rotate(240)"/>
    <path d="M 0,-100 L 15,-85 L 15,-70 L 0,-70 L -15,-70 L -15,-85 Z" fill="url(#grad-yellow)" opacity="0.9" transform="rotate(300)"/>
    <circle r="35" fill="#1a1a2e"/>
  </g>
  
  <!-- AI Neural network nodes -->
  <g opacity="0.7">
    <!-- Left side nodes -->
    <circle cx="300" cy="300" r="25" fill="url(#grad-yellow)"/>
    <circle cx="280" cy="450" r="20" fill="url(#grad-orange)"/>
    <circle cx="320" cy="550" r="22" fill="url(#grad-yellow)"/>
    
    <!-- Right side nodes -->
    <circle cx="724" cy="300" r="25" fill="url(#grad-orange)"/>
    <circle cx="744" cy="450" r="20" fill="url(#grad-yellow)"/>
    <circle cx="704" cy="550" r="22" fill="url(#grad-orange)"/>
    
    <!-- Connection lines -->
    <line x1="300" y1="300" x2="432" y2="380" stroke="url(#grad-yellow)" stroke-width="2" opacity="0.5"/>
    <line x1="280" y1="450" x2="432" y2="400" stroke="url(#grad-orange)" stroke-width="2" opacity="0.5"/>
    <line x1="320" y1="550" x2="432" y2="420" stroke="url(#grad-yellow)" stroke-width="2" opacity="0.5"/>
    <line x1="724" y1="300" x2="592" y2="380" stroke="url(#grad-orange)" stroke-width="2" opacity="0.5"/>
    <line x1="744" y1="450" x2="592" y2="400" stroke="url(#grad-yellow)" stroke-width="2" opacity="0.5"/>
    <line x1="704" y1="550" x2="592" y2="420" stroke="url(#grad-orange)" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Tools icons -->
  <g transform="translate(350, 650)">
    <!-- Wrench -->
    <path d="M 0,0 L 10,10 L 20,0 L 15,-5 L 25,-15 L 20,-20 L 10,-10 L 5,-5 Z" fill="url(#grad-yellow)" opacity="0.8"/>
  </g>
  
  <g transform="translate(650, 650)">
    <!-- Hammer -->
    <rect x="0" y="0" width="8" height="40" fill="url(#grad-orange)" opacity="0.8"/>
    <rect x="-10" y="-5" width="28" height="15" fill="url(#grad-yellow)" opacity="0.8"/>
  </g>
  
  <!-- Building blocks -->
  <rect x="200" y="700" width="60" height="60" fill="url(#grad-yellow)" opacity="0.6" rx="5"/>
  <rect x="770" y="700" width="60" height="60" fill="url(#grad-orange)" opacity="0.6" rx="5"/>
  
  <!-- Title text -->
  <text x="512" y="850" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">
    GetDIYAI.com
  </text>
  <text x="512" y="900" font-family="Arial, sans-serif" font-size="24" fill="#ffd700" text-anchor="middle">
    Build AI Solutions Without Code
  </text>
</svg>
