<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f1f2e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg-dark)"/>
  
  <!-- Left sidebar - Component palette -->
  <rect x="20" y="20" width="200" height="760" fill="url(#card-grad)" rx="10" opacity="0.8"/>
  <text x="120" y="50" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Components</text>
  
  <!-- Component items -->
  <g opacity="0.9">
    <rect x="40" y="80" width="160" height="50" fill="#ff6b35" rx="5" opacity="0.7"/>
    <text x="120" y="110" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Text Analysis</text>
    
    <rect x="40" y="145" width="160" height="50" fill="#4ecdc4" rx="5" opacity="0.7"/>
    <text x="120" y="175" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Image Process</text>
    
    <rect x="40" y="210" width="160" height="50" fill="#95e1d3" rx="5" opacity="0.7"/>
    <text x="120" y="240" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Data Transform</text>
    
    <rect x="40" y="275" width="160" height="50" fill="#ffd700" rx="5" opacity="0.7"/>
    <text x="120" y="305" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" text-anchor="middle">Integration</text>
  </g>
  
  <!-- Main canvas area -->
  <rect x="240" y="20" width="940" height="760" fill="url(#card-grad)" rx="10" opacity="0.5"/>
  
  <!-- Workflow nodes on canvas -->
  <g>
    <!-- Start node -->
    <rect x="320" y="150" width="140" height="80" fill="#4ecdc4" rx="8" opacity="0.9"/>
    <text x="390" y="195" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">Input Data</text>
    <circle cx="460" cy="190" r="5" fill="#ffffff"/>
    
    <!-- Processing node -->
    <rect x="550" y="150" width="140" height="80" fill="#ff6b35" rx="8" opacity="0.9"/>
    <text x="620" y="195" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">AI Process</text>
    <circle cx="550" cy="190" r="5" fill="#ffffff"/>
    <circle cx="690" cy="190" r="5" fill="#ffffff"/>
    
    <!-- Transform node -->
    <rect x="780" y="150" width="140" height="80" fill="#95e1d3" rx="8" opacity="0.9"/>
    <text x="850" y="195" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">Transform</text>
    <circle cx="780" cy="190" r="5" fill="#1a1a2e"/>
    <circle cx="920" cy="190" r="5" fill="#1a1a2e"/>
    
    <!-- Output node -->
    <rect x="1010" y="150" width="140" height="80" fill="#ffd700" rx="8" opacity="0.9"/>
    <text x="1080" y="195" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" text-anchor="middle" font-weight="bold">Output</text>
    <circle cx="1010" cy="190" r="5" fill="#1a1a2e"/>
    
    <!-- Connection lines -->
    <line x1="460" y1="190" x2="550" y2="190" stroke="#ffffff" stroke-width="3" opacity="0.6"/>
    <line x1="690" y1="190" x2="780" y2="190" stroke="#ffffff" stroke-width="3" opacity="0.6"/>
    <line x1="920" y1="190" x2="1010" y2="190" stroke="#ffffff" stroke-width="3" opacity="0.6"/>
    
    <!-- Flow arrows -->
    <polygon points="540,185 550,190 540,195" fill="#ffffff" opacity="0.6"/>
    <polygon points="770,185 780,190 770,195" fill="#ffffff" opacity="0.6"/>
    <polygon points="1000,185 1010,190 1000,195" fill="#ffffff" opacity="0.6"/>
  </g>
  
  <!-- Secondary branch -->
  <g opacity="0.7">
    <rect x="550" y="300" width="140" height="80" fill="#9b59b6" rx="8"/>
    <text x="620" y="345" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">Alternative</text>
    <circle cx="620" cy="300" r="5" fill="#ffffff"/>
    <line x1="620" y1="230" x2="620" y2="300" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Bottom toolbar -->
  <rect x="240" y="720" width="940" height="60" fill="#1a1a2e" rx="8" opacity="0.9"/>
  <g transform="translate(270, 740)">
    <circle cx="15" cy="15" r="12" fill="#4ecdc4"/>
    <circle cx="55" cy="15" r="12" fill="#ff6b35"/>
    <circle cx="95" cy="15" r="12" fill="#ffd700"/>
  </g>
  <text x="900" y="757" font-family="Arial, sans-serif" font-size="14" fill="#4ecdc4" font-weight="bold">Ď Connected</text>
  <text x="1050" y="757" font-family="Arial, sans-serif" font-size="14" fill="#95e1d3" font-weight="bold">Test Run</text>
</svg>
