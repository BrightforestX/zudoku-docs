<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient-com" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A2332;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-gradient-com" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC407A;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#7C4DFF;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#42A5F5;stop-opacity:0.8" />
    </linearGradient>
    
    <!-- Grid pattern -->
    <pattern id="grid-com" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.05"/>
    </pattern>
    
    <!-- Glow filter -->
    <filter id="glow-com" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-gradient-com)"/>
  <rect width="1200" height="630" fill="url(#grid-com)"/>
  
  <!-- Design Frame (left side) -->
  <g transform="translate(150, 200)">
    <rect x="0" y="0" width="200" height="250" rx="8" fill="#1E293B" stroke="url(#accent-gradient-com)" stroke-width="2" opacity="0.9"/>
    <!-- UI components representation -->
    <rect x="20" y="20" width="60" height="30" rx="4" fill="#EC407A" opacity="0.7"/>
    <rect x="90" y="20" width="90" height="30" rx="4" fill="#7C4DFF" opacity="0.7"/>
    <rect x="20" y="70" width="160" height="60" rx="4" fill="#334155" opacity="0.5"/>
    <rect x="20" y="150" width="160" height="80" rx="4" fill="#334155" opacity="0.5"/>
  </g>
  
  <!-- Transformation particles (center) -->
  <g opacity="0.6" filter="url(#glow-com)">
    <circle cx="500" cy="280" r="3" fill="#EC407A"/>
    <circle cx="520" cy="300" r="2" fill="#7C4DFF"/>
    <circle cx="540" cy="290" r="3" fill="#42A5F5"/>
    <circle cx="560" cy="310" r="2" fill="#EC407A"/>
    <circle cx="580" cy="295" r="3" fill="#7C4DFF"/>
    <circle cx="600" cy="285" r="2" fill="#42A5F5"/>
    <circle cx="620" cy="305" r="3" fill="#EC407A"/>
    <circle cx="640" cy="290" r="2" fill="#7C4DFF"/>
    <circle cx="660" cy="300" r="3" fill="#42A5F5"/>
    <circle cx="680" cy="285" r="2" fill="#EC407A"/>
  </g>
  
  <!-- Flow lines -->
  <path d="M 350 325 Q 500 315, 650 325" stroke="url(#accent-gradient-com)" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M 350 315 Q 500 305, 650 315" stroke="url(#accent-gradient-com)" stroke-width="1" fill="none" opacity="0.3"/>
  
  <!-- Code representation (right side) -->
  <g transform="translate(750, 200)">
    <rect x="0" y="0" width="300" height="250" rx="8" fill="#1E293B" stroke="url(#accent-gradient-com)" stroke-width="2" opacity="0.9"/>
    <!-- Code lines -->
    <rect x="20" y="30" width="80" height="4" rx="2" fill="#42A5F5" opacity="0.7"/>
    <rect x="110" y="30" width="120" height="4" rx="2" fill="#EC407A" opacity="0.6"/>
    <rect x="40" y="50" width="100" height="4" rx="2" fill="#7C4DFF" opacity="0.7"/>
    <rect x="150" y="50" width="80" height="4" rx="2" fill="#42A5F5" opacity="0.6"/>
    <rect x="20" y="70" width="60" height="4" rx="2" fill="#EC407A" opacity="0.7"/>
    <rect x="90" y="70" width="140" height="4" rx="2" fill="#7C4DFF" opacity="0.6"/>
    
    <rect x="40" y="100" width="90" height="4" rx="2" fill="#42A5F5" opacity="0.7"/>
    <rect x="140" y="100" width="100" height="4" rx="2" fill="#EC407A" opacity="0.6"/>
    <rect x="20" y="120" width="120" height="4" rx="2" fill="#7C4DFF" opacity="0.7"/>
    <rect x="150" y="120" width="80" height="4" rx="2" fill="#42A5F5" opacity="0.6"/>
    
    <rect x="40" y="150" width="80" height="4" rx="2" fill="#EC407A" opacity="0.7"/>
    <rect x="130" y="150" width="100" height="4" rx="2" fill="#7C4DFF" opacity="0.6"/>
    <rect x="20" y="170" width="140" height="4" rx="2" fill="#42A5F5" opacity="0.7"/>
    <rect x="170" y="170" width="60" height="4" rx="2" fill="#EC407A" opacity="0.6"/>
    
    <rect x="20" y="200" width="100" height="4" rx="2" fill="#7C4DFF" opacity="0.7"/>
    <rect x="130" y="200" width="90" height="4" rx="2" fill="#42A5F5" opacity="0.6"/>
    <rect x="40" y="220" width="80" height="4" rx="2" fill="#EC407A" opacity="0.7"/>
  </g>
  
  <!-- Title and subtitle -->
  <text x="600" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#FFFFFF" text-anchor="middle">
    figmatofullstack.com
  </text>
  <text x="600" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#94A3B8" text-anchor="middle">
    Design-to-Code Automation Platform
  </text>
  
  <!-- Decorative accents -->
  <circle cx="100" cy="100" r="40" fill="url(#accent-gradient-com)" opacity="0.1" filter="url(#glow-com)"/>
  <circle cx="1100" cy="530" r="50" fill="url(#accent-gradient-com)" opacity="0.1" filter="url(#glow-com)"/>
</svg>
